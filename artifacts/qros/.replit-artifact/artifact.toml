kind = "web"
previewPath = "/"
title = "QROS™ AI Operating System"
version = "1.0.0"
id = "artifacts/qros"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 26225
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/qros run dev"

[services.env]
PORT = "26225"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/qros", "run", "build"]
publicDir = "artifacts/qros/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
